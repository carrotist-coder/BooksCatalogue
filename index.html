<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>The Library</title>
</head>
<body>
    <header class="header">
        <div class="header__content">
            <div class="header__logo-wrapper">
                <svg class="header__logo">
                    <use href="assets/book.svg"></use>
                </svg>
            </div>
            <div class="header__title">
                <h2 class="header__heading">The Library</h2>
                <p class="header__description">Discover your next favourite book</p>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="search-section">
            <h1 class="search-section__title">Discover Your Next Great Read</h1>
            <p class="search-section__subtitle">Search millions of books, build your personal library, and never lose track of what to read next.</p>
            <form class="search-form" id="search-form">
                <div class="search-form__field">
                    <svg class="search-logo">
                        <use href="assets/search.svg"></use>
                    </svg>
                    <input id="search-form__input" class="search-form__input" type="search" placeholder="Search for books by title or author...">
                </div>
                <button class="search-form__btn" type="submit">Search</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p class="footer__text">Powered by
            <a class="footer__link" href="https://openlibrary.org/" target="_blank">Open Library</a>
        </p>
    </footer>
</body>
</html>
